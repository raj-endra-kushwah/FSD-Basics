<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="rps.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <button type="button" onclick="window.alert()">
        <img class="options" src="images/paper.png" alt="">
    </button>
    <button type="button">
        <img class="options" src="images/rock.png" alt="">
    </button>
    <button type="button">
        <img class="options" src="images/scissors.png" alt="">
    </button>
    <button type="button">
        <img class="options" src="images/reset.jpg" alt="">
    </button>

    <h3>Game Summary</h3>
    <table>
        <thead>
            <th>Wins</th>
            <th>Loses</th>
            <th>Ties</th>
            <th>Games Played</th>
        </thead>
        <tr>
            <td>0</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>

    </table>
    <h3>Game History</h3>
    <table>
        <thead>
            <th>#</th>
            <th>User Move </th>
            <th>Computer Move</th>
            <th>Result</th>
        </thead>
    </table>

</body>
</html>
